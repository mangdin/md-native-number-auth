buildscript {
  ext.safeExtGet = { prop, fallback ->
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
  }
  repositories {
    google()
    gradlePluginPortal()
    mavenCentral()
  }
  dependencies {
    classpath("com.android.tools.build:gradle:7.0.4")
  }
}

apply plugin: 'com.android.library'

def numberAuthMavenRepo = uri("$projectDir/local-maven")

rootProject.allprojects {
  repositories {
    maven {
      url numberAuthMavenRepo
    }
  }
}

android {
  compileSdkVersion safeExtGet('compileSdkVersion', 33)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 21)
    targetSdkVersion safeExtGet('targetSdkVersion', 33)
    multiDexEnabled true
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      java.srcDirs = ['src/main/java']
      res.srcDirs = ['src/main/res']
      jniLibs.srcDirs = ['libs']
    }
  }

  packagingOptions {
    pickFirst '**/libc++_shared.so'
    pickFirst '**/libjsc.so'
  }
}

repositories {
  mavenCentral()
  google()
  maven {
    url numberAuthMavenRepo
  }
}

dependencies {
  implementation 'com.facebook.react:react-native:+'
  implementation 'androidx.appcompat:appcompat:1.3.1'

  // 阿里云号码认证 SDK 及运营商 SDK
  implementation 'com.aliyun.numberauth:main:2.2.3'
  implementation 'com.aliyun.numberauth:logger:2.2.2'
  implementation 'com.aliyun.numberauth:auth-number-product:2.14.22'
}
